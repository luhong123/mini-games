<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🃏 记忆翻牌</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#fff;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100dvh}
h1{margin:15px 0;font-size:1.8em;color:#e94560}
#info{font-size:1.1em;margin-bottom:10px;color:#aaa;display:flex;gap:25px}
#info span{color:#fff;font-weight:bold}
#board{display:grid;grid-template-columns:repeat(4,80px);gap:8px;margin-bottom:15px}
.card{width:80px;height:80px;perspective:500px;cursor:pointer}
.card-inner{width:100%;height:100%;transition:.3s;transform-style:preserve-3d;position:relative}
.card.flipped .card-inner{transform:rotateY(180deg)}
.card-front,.card-back{position:absolute;width:100%;height:100%;border-radius:8px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;font-size:2.2em}
.card-front{background:#0f3460;border:2px solid #16213e;transform:rotateY(180deg)}
.card-back{background:#1a4a7a;border:2px solid #0f3460}
.card-back::after{content:'?';font-size:1.8em;color:#7ec8e3}
.card.matched .card-front{background:#0a2a1a;border-color:#00c000}
.card.matched{cursor:default}
#controls{margin:10px 0}
button{padding:8px 25px;font-size:1em;border:none;border-radius:6px;cursor:pointer;background:#e94560;color:#fff;font-weight:bold;transition:.2s}
button:hover{background:#c7364f}
.size-btn{background:#0f3460;margin:0 4px;padding:6px 14px}
.size-btn.active{background:#e94560}
.back{position:absolute;top:15px;left:15px;color:#888;text-decoration:none}
.back:hover{color:#e94560}

body{padding-bottom:env(safe-area-inset-bottom,0px)}
@media(orientation:landscape){body{padding-left:env(safe-area-inset-left,0px);padding-right:env(safe-area-inset-right,0px)}}

</style></head><body>
<a href="index.html" class="back">← 返回</a>
<h1>🃏 记忆翻牌</h1>
<div id="info"><span>步数: <span id="moves">0</span></span><span>配对: <span id="pairs">0</span>/8</span></div>
<div id="board"></div>
<div id="controls">
  <button id="newBtn">新游戏</button>
  <button class="size-btn active" data-size="4">4×4</button>
  <button class="size-btn" data-size="6">6×6</button>
</div>
<script>
const BOARD=document.getElementById('board'),movesEl=document.getElementById('moves'),pairsEl=document.getElementById('pairs')
const newBtn=document.getElementById('newBtn')
const EMOJIS=['🐶','🐱','🐼','🐨','🦊','🐰','🐸','🦄','🐲','🐙','🦋','🐝','🐢','🐬','🦉','🐧','🐺','🐮']
let cards=[],flipped=[],matched=0,moves=0,lock=false,size=4

function initGame(s){
  size=s||size;BOARD.style.gridTemplateColumns=`repeat(${size},80px)`
  const total=size*size
  if(total%2!==0)return
  const pairCount=total/2
  const emojis=EMOJIS.slice(0,pairCount)
  cards=[...emojis,...emojis].sort(()=>Math.random()-.5)
  flipped=[];matched=0;moves=0;lock=false
  movesEl.textContent='0';pairsEl.textContent=`0/${pairCount}`
  BOARD.innerHTML=''
  cards.forEach((emoji,i)=>{
    const card=document.createElement('div');card.className='card';card.dataset.i=i
    card.innerHTML=`<div class="card-inner"><div class="card-front">${emoji}</div><div class="card-back"></div></div>`
    card.addEventListener('click',_=>flipCard(card,i))
    BOARD.appendChild(card)
  })
}

function flipCard(card,i){
  if(lock||card.classList.contains('flipped')||card.classList.contains('matched'))return
  card.classList.add('flipped');flipped.push(i)
  if(flipped.length===2){moves++;movesEl.textContent=moves;lock=true;checkMatch()}
}
function checkMatch(){
  const [a,b]=flipped
  if(cards[a]===cards[b]){
    BOARD.children[a].classList.add('matched')
    BOARD.children[b].classList.add('matched')
    matched++;const total=size*size/2
    pairsEl.textContent=`${matched}/${total}`
    flipped=[];lock=false
    if(matched===total)setTimeout(()=>alert('🎉 恭喜通关！'),300)
  }else{
    setTimeout(()=>{
      BOARD.children[a].classList.remove('flipped')
      BOARD.children[b].classList.remove('flipped')
      flipped=[];lock=false
    },700)
  }
}

newBtn.addEventListener('click',_=>initGame(size))
document.querySelectorAll('.size-btn').forEach(btn=>{
  btn.addEventListener('click',_=>{
    document.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('active'))
    btn.classList.add('active')
    initGame(parseInt(btn.dataset.size))
  })
})
initGame(4)
</script></body></html>
