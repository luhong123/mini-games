<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>⬛ 认识形状</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#1a1a2e;color:#fff;font-family:sans-serif;overflow:hidden;height:100dvh;display:flex;flex-direction:column;align-items:center;touch-action:manipulation;-webkit-user-select:none;user-select:none}
.back{position:absolute;top:12px;left:12px;color:#888;text-decoration:none;font-size:14px;z-index:10}
.back:hover{color:#e94560}
#header{padding:10px 0 4px;text-align:center;position:relative;width:100%}
#header h1{font-size:clamp(1em,4vw,1.4em);color:#e94560;margin-bottom:2px}
#modeBar{display:flex;gap:10px;justify-content:center;align-items:center;margin:4px 0}
#modeBtn{padding:6px 18px;font-size:clamp(.8em,3vw,1em);border:none;border-radius:20px;cursor:pointer;background:#0f3460;color:#7ec8e3;font-weight:bold;transition:.3s}
#modeBtn.active{background:#e94560;color:#fff}
#countWrap{font-size:clamp(1em,4vw,1.5em);min-height:1.5em;text-align:center;padding:0 16px}
#countWrap .emoji{font-size:clamp(1.5em,6vw,2.5em)}
#grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:clamp(8px,2vw,16px);padding:clamp(8px,2vw,16px);max-width:520px;width:100%;flex:1;align-content:center}
.shape-btn{border-radius:16px;aspect-ratio:1;cursor:pointer;border:4px solid rgba(255,255,255,.12);transition:transform .2s,box-shadow .2s,border-color .2s;touch-action:manipulation;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.shape-btn canvas{width:100%;height:100%;display:block;pointer-events:none}
.shape-btn:active{transform:scale(.92)}
.shape-btn.pop{animation:pop .35s ease}
@keyframes pop{0%{transform:scale(1)}30%{transform:scale(1.2)}60%{transform:scale(.95)}100%{transform:scale(1)}}
.shape-btn.hint{border-color:#fff;box-shadow:0 0 25px rgba(255,255,255,.5);animation:pulse .6s ease infinite alternate}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.08)}}
.shape-btn.correct{animation:correctPop .5s ease}
@keyframes correctPop{0%{transform:scale(1)}20%{transform:scale(1.3)}100%{transform:scale(1)}}
.shape-btn.wrong{animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
#celebrate{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5}
#scoreBadge{position:absolute;top:12px;right:12px;font-size:clamp(1.2em,4vw,1.6em);z-index:3;color:#f1c40f}
</style></head><body>
<a href="index.html" class="back">← 返回</a>
<div id="scoreBadge" style="display:none">⭐ 0</div>
<div id="header">
  <h1>⬛ 认识形状</h1>
  <div id="modeBar">
    <button id="modeBtn">🔍 找形状</button>
  </div>
  <div id="countWrap"></div>
</div>
<div id="grid"></div>
<canvas id="celebrate"></canvas>
<script>
const ALL_SHAPES = [
  {name:'圆形', id:'circle', color:'#3498DB'},
  {name:'三角形', id:'triangle', color:'#E74C3C'},
  {name:'正方形', id:'square', color:'#2ECC71'},
  {name:'星形', id:'star', color:'#F1C40F'},
  {name:'心形', id:'heart', color:'#E91E63'},
  {name:'菱形', id:'diamond', color:'#9B59B6'},
]
const PRAISE = ['太棒了！','真厉害！','好聪明！','非常好！','真棒！','做得好！']
const ENCOURAGE = ['再试试～','换一个看看～','加油喔～','差一点点～']
let shapes = []
let mode = 'explore'
let quizIdx = 0
let quizCorrect = 0
let quizTotal = 0
let hintTimer = null

const gridEl = document.getElementById('grid')
const countWrap = document.getElementById('countWrap')
const modeBtn = document.getElementById('modeBtn')
const celebrateCanvas = document.getElementById('celebrate')
const scoreBadge = document.getElementById('scoreBadge')
const ctx = celebrateCanvas.getContext('2d')
let particles = []
let animFrame = null

function resizeCanvas(){celebrateCanvas.width=window.innerWidth;celebrateCanvas.height=window.innerHeight}
window.addEventListener('resize',resizeCanvas);resizeCanvas()

// --- Shape Drawing ---
function drawShape(canvas, shapeId, color){
  const w = canvas.width, h = canvas.height
  const c = canvas.getContext('2d')
  const cx = w/2, cy = h/2, s = Math.min(w,h)*0.35

  c.clearRect(0,0,w,h)

  // Background circle (soft glow)
  c.fillStyle = color+'22'
  c.beginPath(); c.arc(cx,cy,s*1.15,0,Math.PI*2); c.fill()

  // Main shape
  c.fillStyle = color
  c.strokeStyle = '#ffffff44'
  c.lineWidth = 3

  switch(shapeId){
    case 'circle':
      c.beginPath(); c.arc(cx,cy,s,0,Math.PI*2); c.fill(); c.stroke()
      break
    case 'triangle':
      c.beginPath()
      c.moveTo(cx, cy-s)
      c.lineTo(cx-s*0.87, cy+s*0.5)
      c.lineTo(cx+s*0.87, cy+s*0.5)
      c.closePath(); c.fill(); c.stroke()
      break
    case 'square':
      c.fillRect(cx-s, cy-s, s*2, s*2)
      c.strokeRect(cx-s, cy-s, s*2, s*2)
      break
    case 'star':{
      c.beginPath()
      for(let i=0;i<10;i++){
        const angle = -Math.PI/2 + i*Math.PI/5
        const r = i%2===0 ? s : s*0.45
        const px = cx + Math.cos(angle)*r
        const py = cy + Math.sin(angle)*r
        i===0 ? c.moveTo(px,py) : c.lineTo(px,py)
      }
      c.closePath(); c.fill(); c.stroke()
      break
    }
    case 'heart':{
      c.beginPath()
      const sc = s*0.8
      c.moveTo(cx, cy+sc*0.7)
      c.bezierCurveTo(cx+sc*1.3, cy+sc*0.3, cx+sc*1.1, cy-sc*0.8, cx, cy-sc*0.2)
      c.bezierCurveTo(cx-sc*1.1, cy-sc*0.8, cx-sc*1.3, cy+sc*0.3, cx, cy+sc*0.7)
      c.fill(); c.stroke()
      break
    }
    case 'diamond':
      c.beginPath()
      c.moveTo(cx, cy-s)
      c.lineTo(cx+s, cy)
      c.lineTo(cx, cy+s)
      c.lineTo(cx-s, cy)
      c.closePath(); c.fill(); c.stroke()
      break
  }

  // Smiley face
  c.fillStyle = '#fff'
  const eyeR = s*0.07
  // eyes
  const eyeY = shapeId==='heart'?cy-s*0.15:cy-s*0.15
  const eyeX = s*0.25
  c.beginPath(); c.arc(cx-eyeX,eyeY,eyeR,0,Math.PI*2); c.fill()
  c.beginPath(); c.arc(cx+eyeX,eyeY,eyeR,0,Math.PI*2); c.fill()
  // mouth
  c.strokeStyle = '#fff'; c.lineWidth = Math.max(2, s*0.06)
  c.beginPath(); c.arc(cx,cy+s*0.1,s*0.2,0.1,Math.PI-0.1); c.stroke()
}

// --- Speech ---
function speak(text, cb){
  if(!window.speechSynthesis)return cb&&cb()
  window.speechSynthesis.cancel()
  const msg = new SpeechSynthesisUtterance(text)
  msg.lang = 'zh-CN'; msg.rate = 0.85; msg.pitch = 1.2
  msg.onend = ()=>{cb&&cb()}
  msg.onerror = ()=>{cb&&cb()}
  speechSynthesis.speak(msg)
}

function speakShape(shape){
  speak(shape.name, ()=>{
    if(mode==='explore') scheduleNextHint()
  })
}

function speakFind(){
  speak('找' + shapes[quizIdx].name + '！')
}

function speakPraise(){
  speak(PRAISE[Math.floor(Math.random()*PRAISE.length)])
}

function speakEncourage(){
  speak(ENCOURAGE[Math.floor(Math.random()*ENCOURAGE.length)])
}

// --- Celebration Particles ---
function spawnParticles(x,y){
  for(let i=0;i{countWrap.innerHTML=''},1500)
}

// --- Game Logic ---
function shuffleArray(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function initGame(){
  clearHint()
  const n = Math.min(3, ALL_SHAPES.length)
  shapes = shuffleArray([...ALL_SHAPES]).slice(0, n)
  if(mode==='find'){
    quizIdx = Math.floor(Math.random()*shapes.length)
    quizCorrect = 0; quizTotal = 0
    scoreBadge.style.display='block'
    scoreBadge.textContent = '⭐ 0'
    countWrap.innerHTML = ''
    setTimeout(speakFind, 500)
  } else {
    scoreBadge.style.display='none'
    countWrap.innerHTML = '👆 点一点形状听听看'
    setTimeout(()=>{if(mode==='explore')scheduleNextHint()}, 1000)
  }
  render()
}

function render(){
  gridEl.innerHTML = ''
  for(let i=0;i<shapes.length;i++){
    const s = shapes[i]
    const btn = document.createElement('div')
    btn.className = 'shape-btn'
    btn.style.background = s.color+'22'
    btn.dataset.i = i
    const cv = document.createElement('canvas')
    cv.width = 200; cv.height = 200
    drawShape(cv, s.id, s.color)
    btn.appendChild(cv)
    btn.addEventListener('click', ()=>handleTap(i))
    btn.addEventListener('touchstart', (e)=>{e.preventDefault();handleTap(i)},{passive:false})
    gridEl.appendChild(btn)
  }
  if(mode==='find') highlightQuiz()
}

function highlightQuiz(){
  document.querySelectorAll('.shape-btn').forEach((el,i)=>{
    el.classList.remove('hint')
    if(i===quizIdx) el.classList.add('hint')
  })
}

function handleTap(i){
  clearHint()
  const btn = document.querySelectorAll('.shape-btn')[i]
  if(!btn) return

  if(mode==='explore'){
    btn.classList.remove('pop'); void btn.offsetWidth; btn.classList.add('pop')
    celebrate(btn)
    speakShape(shapes[i])
  } else {
    if(i===quizIdx){
      btn.classList.remove('hint','wrong'); btn.classList.remove('correct'); void btn.offsetWidth; btn.classList.add('correct')
      btn.classList.remove('hint')
      quizCorrect++; quizTotal++
      scoreBadge.textContent = '⭐ '+quizCorrect
      celebrate(btn)
      speakPraise()
      const remaining = shapes.filter((_,idx)=>idx!==quizIdx)
      if(remaining.length>1){
        const newIdx = Math.floor(Math.random()*remaining.length)
        quizIdx = shapes.indexOf(remaining[newIdx])
      } else {
        shapes = shuffleArray([...ALL_SHAPES]).slice(0, Math.min(3, ALL_SHAPES.length))
        quizIdx = Math.floor(Math.random()*shapes.length)
      }
      render()
      setTimeout(speakFind, 1200)
    } else {
      btn.classList.remove('wrong'); void btn.offsetWidth; btn.classList.add('wrong')
      btn.classList.remove('hint')
      quizTotal++
      speakEncourage()
      setTimeout(()=>{
        document.querySelectorAll('.shape-btn').forEach((el,idx)=>{
          el.classList.remove('wrong')
          if(idx===quizIdx) el.classList.add('hint')
        })
      }, 600)
    }
  }
}

function scheduleNextHint(){
  clearHint()
  if(mode!=='explore') return
  hintTimer = setTimeout(()=>{
    if(mode!=='explore') return
    const btns = document.querySelectorAll('.shape-btn')
    if(!btns.length) return
    const idx = Math.floor(Math.random()*btns.length)
    btns.forEach(b=>b.classList.remove('hint'))
    btns[idx].classList.add('hint')
    const si = parseInt(btns[idx].dataset.i)
    speakShape(shapes[si])
  }, 5000)
}

function clearHint(){
  if(hintTimer){clearTimeout(hintTimer);hintTimer=null}
}

// --- Mode Toggle ---
function toggleMode(){
  clearHint()
  particles=[]
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null}
  ctx.clearRect(0,0,celebrateCanvas.width,celebrateCanvas.height)

  if(mode==='explore'){
    mode='find'
    modeBtn.textContent='🎨 自由探索'
    modeBtn.classList.add('active')
  } else {
    mode='explore'
    modeBtn.textContent='🔍 找形状'
    modeBtn.classList.remove('active')
  }
  initGame()
}

modeBtn.addEventListener('click', toggleMode)

// --- Init ---
initGame()
</script>
</body></html>
