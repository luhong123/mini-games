<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8">
<meta name="description" content="小游戏合集 · ⬛ 认识形状">
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%2016%2016%27%3E%3Ctext%20y%3D%2714%27%20font-size%3D%2714%27%3E%F0%9F%8E%AE%3C%2Ftext%3E%3C%2Fsvg%3E">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>⬛ 认识形状</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#1e1e2a;color:#fff;font-family:sans-serif;overflow:hidden;min-height:100dvh;display:flex;flex-direction:column;align-items:center;touch-action:manipulation;-webkit-user-select:none;user-select:none}
.back{position:absolute;top:12px;left:12px;color:#888;text-decoration:none;font-size:14px;z-index:10;background:#16213e88;padding:4px 10px;border-radius:8px}
.back:hover{color:#e94560}
#header{padding:8px 0 2px;text-align:center;position:relative;width:100%}
#header h1{font-size:clamp(1em,4vw,1.4em);color:#e94560;margin-bottom:2px}
#modeBar{display:flex;gap:8px;justify-content:center;align-items:center;margin:4px 0;flex-wrap:wrap}
#modeBtn{padding:6px 18px;font-size:clamp(.8em,3vw,1em);border:none;border-radius:20px;cursor:pointer;background:#0f3460;color:#7ec8e3;font-weight:bold;transition:.3s}
#modeBtn.active{background:#e94560;color:#fff}
#shuffleBtn{padding:6px 14px;font-size:clamp(.8em,3vw,1em);border:none;border-radius:20px;cursor:pointer;background:#16213e;color:#aaa;font-weight:bold;transition:.3s}
#shuffleBtn:active{transform:scale(.9)}
#countWrap{font-size:clamp(1em,4vw,1.5em);min-height:1.5em;text-align:center;padding:0 8px}
#countWrap .emoji{font-size:clamp(1.5em,6vw,2.5em)}
#grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(6px,1.5vw,10px);padding:clamp(6px,1.5vw,12px);max-width:520px;width:100%;flex:1;align-content:start}
.shape-btn{border-radius:16px;aspect-ratio:1;cursor:pointer;border:4px solid rgba(255,255,255,.15);transition:transform .2s,box-shadow .2s,border-color .2s;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;position:relative;overflow:hidden}
.shape-btn canvas{width:clamp(35px,12vw,70px);height:clamp(35px,12vw,70px);display:block;pointer-events:none;flex-shrink:0}
.shape-btn .shape-name{font-size:clamp(.5em,2vw,.75em);color:rgba(255,255,255,.9);font-weight:bold;text-shadow:0 1px 3px rgba(0,0,0,.5);line-height:1}
.shape-btn:active{transform:scale(.92)}
.shape-btn.pop{animation:pop .35s ease}
@keyframes pop{0%{transform:scale(1)}30%{transform:scale(1.2)}60%{transform:scale(.95)}100%{transform:scale(1)}}
.shape-btn.hint{border-color:#fff;box-shadow:0 0 25px rgba(255,255,255,.5);animation:pulse .6s ease infinite alternate}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.08)}}
.shape-btn.correct{animation:correctPop .5s ease}
@keyframes correctPop{0%{transform:scale(1)}20%{transform:scale(1.3)}100%{transform:scale(1)}}
.shape-btn.wrong{animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
#celebrate{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5}
#scoreBadge{position:absolute;top:12px;right:12px;font-size:clamp(1.2em,4vw,1.6em);z-index:3;color:#f1c40f;background:#16213e88;padding:2px 10px;border-radius:12px}

body{padding-bottom:env(safe-area-inset-bottom,0px)}
@media(orientation:landscape){body{padding-left:env(safe-area-inset-left,0px);padding-right:env(safe-area-inset-right,0px)}}

</style></head><body>
<a href="index.html" class="back">← 返回</a>
<div id="scoreBadge" style="display:none">⭐ 0</div>
<div id="header">
  <h1>⬛ 认识形状</h1>
  <div id="modeBar">
    <button id="modeBtn">🔍 找形状</button>
    <button id="shuffleBtn">🔄 换一批</button>
  </div>
  <div id="countWrap"></div>
</div>
<div id="grid"></div>
<canvas id="celebrate"></canvas>
<script>
const ALL_SHAPES = [
  {name:'圆形', id:'circle', color:'#3498DB'},
  {name:'三角形', id:'triangle', color:'#E74C3C'},
  {name:'正方形', id:'square', color:'#2ECC71'},
  {name:'长方形', id:'rect', color:'#FF8C00'},
  {name:'梯形', id:'trapezoid', color:'#E91E63'},
  {name:'椭圆形', id:'oval', color:'#1E90FF'},
  {name:'半圆形', id:'semicircle', color:'#00B894'},
  {name:'五边形', id:'pentagon', color:'#F39C12'},
  {name:'六边形', id:'hexagon', color:'#8E44AD'},
  {name:'星形', id:'star', color:'#FFD700'},
  {name:'心形', id:'heart', color:'#FF69B4'},
  {name:'菱形', id:'diamond', color:'#BB5EFF'},
]
const PRAISE = ['太棒了！','真厉害！','好聪明！','非常好！','真棒！','做得好！']
const ENCOURAGE = ['再试试～','换一个看看～','加油喔～','差一点点～']

let shapes = []
let mode = 'explore'
let quizIdx = 0
let quizScore = 0
let hintTimer = null

const gridEl = document.getElementById('grid')
const countWrap = document.getElementById('countWrap')
const modeBtn = document.getElementById('modeBtn')
const shuffleBtn = document.getElementById('shuffleBtn')
const celebrateCanvas = document.getElementById('celebrate')
const scoreBadge = document.getElementById('scoreBadge')
const ctx = celebrateCanvas.getContext('2d')
let particles = []
let animFrame = null
let audioCtx = null

function resizeCanvas(){celebrateCanvas.width=window.innerWidth;celebrateCanvas.height=window.innerHeight}
window.addEventListener('resize',resizeCanvas);resizeCanvas()

function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)()
  return audioCtx
}

function playApplause(){
  try{
    const ac=getAudioCtx(), now=ac.currentTime
    for(let i=0;i<8;i++){
      const t=now+i*0.08+Math.random()*0.03
      const osc=ac.createOscillator(), gain=ac.createGain()
      osc.type='sawtooth'; osc.frequency.value=800+Math.random()*1200
      gain.gain.setValueAtTime(0.12,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.06)
      osc.connect(gain); gain.connect(ac.destination); osc.start(t); osc.stop(t+0.06)
    }

// iOS speech unlock
if(/iPad|iPhone|iPod/.test(navigator.userAgent)){var _iosUnlocked=false;document.addEventListener('touchstart',function(){if(!_iosUnlocked){_iosUnlocked=true;speechSynthesis.cancel();var m=new SpeechSynthesisUtterance(' ');speechSynthesis.speak(m)}},{once:true})}

    const t2=now+0.7; const osc2=ac.createOscillator(), gain2=ac.createGain()
    osc2.type='sawtooth'; osc2.frequency.value=600
    gain2.gain.setValueAtTime(0.2,t2); gain2.gain.exponentialRampToValueAtTime(0.001,t2+0.1)
    osc2.connect(gain2); gain2.connect(ac.destination); osc2.start(t2); osc2.stop(t2+0.1)
  }catch(e){}
}

// --- Shape Drawing ---
function drawShape(canvas, shapeId, color){
  const w=canvas.width, h=canvas.height
  const c=canvas.getContext('2d')
  const cx=w/2, cy=h/2, s=Math.min(w,h)*0.35

  c.clearRect(0,0,w,h)
  c.fillStyle=color+'22'
  c.beginPath(); c.arc(cx,cy,s*1.15,0,Math.PI*2); c.fill()
  c.fillStyle=color
  c.strokeStyle='#ffffff44'
  c.lineWidth=3

  switch(shapeId){
    case 'circle':
      c.beginPath(); c.arc(cx,cy,s,0,Math.PI*2); c.fill(); c.stroke()
      break
    case 'triangle':
      c.beginPath()
      c.moveTo(cx,cy-s); c.lineTo(cx-s*0.87,cy+s*0.5); c.lineTo(cx+s*0.87,cy+s*0.5)
      c.closePath(); c.fill(); c.stroke()
      break
    case 'square':
      c.fillRect(cx-s,cy-s,s*2,s*2); c.strokeRect(cx-s,cy-s,s*2,s*2)
      break
    case 'rect':
      c.fillRect(cx-s*1.2,cy-s*0.6,s*2.4,s*1.2); c.strokeRect(cx-s*1.2,cy-s*0.6,s*2.4,s*1.2)
      break
    case 'trapezoid':
      c.beginPath()
      c.moveTo(cx-s*1.1,cy+s*0.5); c.lineTo(cx+s*1.1,cy+s*0.5)
      c.lineTo(cx+s*0.55,cy-s*0.5); c.lineTo(cx-s*0.55,cy-s*0.5)
      c.closePath(); c.fill(); c.stroke()
      break
    case 'oval':
      c.beginPath(); c.ellipse(cx,cy,s*1.2,s*0.7,0,0,Math.PI*2)
      c.fill(); c.stroke()
      break
    case 'semicircle':
      c.beginPath(); c.arc(cx,cy,s,0,Math.PI); c.closePath()
      c.fill(); c.stroke()
      break
    case 'pentagon':{
      c.beginPath()
      for(let i=0;i<5;i++){const a=-Math.PI/2+i*Math.PI*2/5; i===0?c.moveTo(cx+Math.cos(a)*s,cy+Math.sin(a)*s):c.lineTo(cx+Math.cos(a)*s,cy+Math.sin(a)*s)}
      c.closePath(); c.fill(); c.stroke()
      break
    }
    case 'hexagon':{
      c.beginPath()
      for(let i=0;i<6;i++){const a=-Math.PI/3+i*Math.PI/3; i===0?c.moveTo(cx+Math.cos(a)*s,cy+Math.sin(a)*s):c.lineTo(cx+Math.cos(a)*s,cy+Math.sin(a)*s)}
      c.closePath(); c.fill(); c.stroke()
      break
    }
    case 'star':{
      c.beginPath()
      for(let i=0;i<10;i++){const a=-Math.PI/2+i*Math.PI/5; const r=i%2===0?s:s*0.45; i===0?c.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r):c.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r)}
      c.closePath(); c.fill(); c.stroke()
      break
    }
    case 'heart':{
      c.beginPath(); const sc=s*0.8
      c.moveTo(cx,cy+sc*0.7)
      c.bezierCurveTo(cx+sc*1.3,cy+sc*0.3,cx+sc*1.1,cy-sc*0.8,cx,cy-sc*0.2)
      c.bezierCurveTo(cx-sc*1.1,cy-sc*0.8,cx-sc*1.3,cy+sc*0.3,cx,cy+sc*0.7)
      c.fill(); c.stroke()
      break
    }
    case 'diamond':
      c.beginPath()
      c.moveTo(cx,cy-s); c.lineTo(cx+s,cy); c.lineTo(cx,cy+s); c.lineTo(cx-s,cy)
      c.closePath(); c.fill(); c.stroke()
      break
  }
  // smiley
  c.fillStyle='#fff'
  const eyeR=s*0.07, eyeY=cy-s*0.15, eyeX=s*0.25
  c.beginPath(); c.arc(cx-eyeX,eyeY,eyeR,0,Math.PI*2); c.fill()
  c.beginPath(); c.arc(cx+eyeX,eyeY,eyeR,0,Math.PI*2); c.fill()
  c.strokeStyle='#fff'; c.lineWidth=Math.max(2,s*0.06)
  c.beginPath(); c.arc(cx,cy+s*0.1,s*0.2,0.1,Math.PI-0.1); c.stroke()
}

// --- Speech ---
function playWrongSound(){try{const ac=getAudioCtx(),now=ac.currentTime;const osc=ac.createOscillator(),gain=ac.createGain();osc.type='sine';osc.frequency.setValueAtTime(300,now);osc.frequency.linearRampToValueAtTime(200,now+0.15);gain.gain.setValueAtTime(0.08,now);gain.gain.exponentialRampToValueAtTime(0.001,now+0.15);osc.connect(gain);gain.connect(ac.destination);osc.start(now);osc.stop(now+0.15)}catch(e){}}


function vibrate(ms){if(navigator.vibrate)navigator.vibrate(ms)}
let _spQ=[],_spBusy=false
function speak(text,cb){_spQ.push({t:text,c:cb});if(!_spBusy)_spNext()}
function _spNext(){if(!_spQ.length){_spBusy=false;return}_spBusy=true;const x=_spQ.shift();if(!window.speechSynthesis){x.c&&x.c();_spNext();return}window.speechSynthesis.cancel();const m=new SpeechSynthesisUtterance(x.t);m.lang='zh-CN';m.rate=0.5;m.pitch=1.6;m.onend=()=>{x.c&&x.c();_spNext()};m.onerror=()=>{x.c&&x.c();_spNext()};speechSynthesis.speak(m);setTimeout(()=>{if(window.speechSynthesis&&!window.speechSynthesis.speaking){try{speechSynthesis.speak(m)}catch(e){}}},120)}
function speakShape(shape){speak(shape.name,()=>{if(mode==='explore')scheduleNextHint()})}
function speakFind(){if(mode!=='find')return;speak('找'+shapes[quizIdx].name)}

let progress=JSON.parse(localStorage.getItem('prog_'+location.pathname)||'{}')
function saveProgress(correct,total){const k=items?items.map(i=>i.name).sort().join(','):'default';if(!progress[k])progress[k]={c:0,t:0};progress[k].c+=correct;progress[k].t+=total;localStorage.setItem('prog_'+location.pathname,JSON.stringify(progress))}
function getProgress(){const k=items?items.map(i=>i.name).sort().join(','):'default';return progress[k]||{c:0,t:0}}
function speakPraise(){speak(PRAISE[Math.floor(Math.random()*PRAISE.length)])}
function speakEncourage(){speak(ENCOURAGE[Math.floor(Math.random()*ENCOURAGE.length)])}

// --- Celebration ---
function spawnParticles(x,y){
  for(let i=0;i<60;i++){
    const angle=Math.random()*Math.PI*2, speed=2+Math.random()*6
    particles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-2,
      size:4+Math.random()*10,color:ALL_SHAPES[Math.floor(Math.random()*ALL_SHAPES.length)].color,
      life:1,decay:0.01+Math.random()*0.015,wobble:Math.random()*4})
  }
  if(!animFrame) animFrame=requestAnimationFrame(drawParticles)
}
function drawParticles(){
  ctx.clearRect(0,0,celebrateCanvas.width,celebrateCanvas.height)
  let alive=false
  for(const p of particles){p.x+=p.vx;p.vy+=0.08;p.y+=p.vy;p.x+=Math.sin(p.y*0.05)*p.wobble;p.life-=p.decay;if(p.life<=0)continue;alive=true;ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size)}
  ctx.globalAlpha=1;particles=particles.filter(p=>p.life>0)
  if(alive)animFrame=requestAnimationFrame(drawParticles);else animFrame=null
}
function celebrate(el){const r=el.getBoundingClientRect();spawnParticles(r.left+r.width/2,r.top+r.height/2);countWrap.innerHTML='<div class="emoji">🎉✨🌟</div>';setTimeout(()=>countWrap.innerHTML='',1500)}

// --- Logic ---
function shuffleArray(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}


document.querySelector('h1').addEventListener('contextmenu',e=>{e.preventDefault();showSettings()})
function showSettings(){
  const old=document.getElementById('settingsPanel');if(old){old.remove();return}
  const panel=document.createElement('div')
  panel.id='settingsPanel'
  panel.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px'
  const title=document.createElement('div');title.textContent='⚙️ 家长设置';title.style.cssText='color:#e94560;font-size:1.5em;font-weight:bold'
  const speedLabel=document.createElement('div');speedLabel.textContent='语速: 0.5';speedLabel.style.cssText='color:#fff;font-size:1em'
  const speedSlider=document.createElement('input');speedSlider.type='range';speedSlider.min='0.3';speedSlider.max='0.9';speedSlider.step='0.1';speedSlider.value='0.5'
  speedSlider.style.cssText='width:200px'
  speedSlider.oninput=()=>{speedLabel.textContent='语速: '+speedSlider.value;document.querySelectorAll('meta[name=viewport]')}
  const countLabel=document.createElement('div');countLabel.textContent='每次显示: 6个';countLabel.style.cssText='color:#fff;font-size:1em'
  const countSlider=document.createElement('input');countSlider.type='range';countSlider.min='3';countSlider.max='9';countSlider.step='1';countSlider.value='6'
  countSlider.style.cssText='width:200px'
  countSlider.oninput=()=>{countLabel.textContent='每次显示: '+countSlider.value+'个'}
  const closeBtn=document.createElement('button');closeBtn.textContent='完成';closeBtn.style.cssText='padding:10px 30px;font-size:1em;border:none;border-radius:8px;background:#e94560;color:#fff;font-weight:bold;margin-top:10px'
  closeBtn.onclick=()=>{panel.remove();window._parentSpeed=parseFloat(speedSlider.value);window._parentCount=parseInt(countSlider.value)}
  panel.appendChild(title);panel.appendChild(speedLabel);panel.appendChild(speedSlider)
  panel.appendChild(countLabel);panel.appendChild(countSlider);panel.appendChild(closeBtn)
  document.body.appendChild(panel)
}

function initGame(){
  clearHint()
  if(mode==='explore') countWrap.innerHTML='👆 点一点形状听听看'
  else countWrap.innerHTML=''
  quizScore=0; scoreBadge.style.display=mode==='find'?'block':'none'; scoreBadge.textContent='⭐ 0'
  pickShapes(); render()
  if(mode==='find') setTimeout(speakFind,500)
  else setTimeout(()=>{if(mode==='explore')scheduleNextHint()},1000)
}

function pickShapes(){shapes=shuffleArray([...ALL_SHAPES]).slice(0,Math.min(9,ALL_SHAPES.length));quizIdx=Math.floor(Math.random()*shapes.length)}

function render(){
  gridEl.innerHTML=''
  for(let i=0;i<shapes.length;i++){
    const s=shapes[i], btn=document.createElement('div')
    btn.className='shape-btn'; btn.style.background=s.color+'22'; btn.dataset.i=i
    const cv=document.createElement('canvas'); cv.width=100; cv.height=100; drawShape(cv,s.id,s.color)
    btn.appendChild(cv)
    const label=document.createElement('span'); label.className='shape-name'; label.textContent=s.name; btn.appendChild(label)
    btn.addEventListener('click',()=>handleTap(i))
    btn.addEventListener('touchstart',(e)=>{e.preventDefault();handleTap(i)},{passive:false})
    gridEl.appendChild(btn)
  }
  
}

function highlightQuiz(){document.querySelectorAll('.shape-btn').forEach((el,i)=>el.classList.toggle('hint',i===quizIdx))}

function handleTap(i){
  clearHint(); const btn=document.querySelectorAll('.shape-btn')[i]; if(!btn)return
  if(mode==='explore'){
    btn.classList.remove('pop');void btn.offsetWidth;btn.classList.add('pop')
    celebrate(btn); speakShape(shapes[i])
  }else{
    if(i===quizIdx){
      btn.classList.remove('hint','wrong','correct');void btn.offsetWidth;btn.classList.add('correct')
      quizScore++; scoreBadge.textContent='⭐ '+quizScore
      celebrate(btn); playApplause();vibrate(50); speakPraise()
      pickShapes(); render(); setTimeout(speakFind,1200)
    }else{
      btn.classList.remove('wrong');void btn.offsetWidth;btn.classList.add('wrong')
      speakEncourage();vibrate(100);playWrongSound()
      setTimeout(()=>{document.querySelectorAll('.shape-btn').forEach((el,idx)=>{el.classList.remove('wrong');if(idx===quizIdx)el.classList.add('hint')})},600)
    }
  }
}

function scheduleNextHint(){
  clearHint(); if(mode!=='explore')return
  hintTimer=setTimeout(()=>{if(mode!=='explore')return;const btns=document.querySelectorAll('.shape-btn');if(!btns.length)return;const idx=Math.floor(Math.random()*btns.length);btns.forEach(b=>b.classList.remove('hint'));btns[idx].classList.add('hint');speakShape(shapes[parseInt(btns[idx].dataset.i)])},5000)
}

function clearHint(){if(hintTimer){clearTimeout(hintTimer);hintTimer=null}if(window.speechSynthesis)window.speechSynthesis.cancel()}

modeBtn.addEventListener('click',()=>{
  clearHint();particles=[];if(animFrame){cancelAnimationFrame(animFrame);animFrame=null}
  ctx.clearRect(0,0,celebrateCanvas.width,celebrateCanvas.height)
  mode=mode==='explore'?'find':'explore'
  modeBtn.textContent=mode==='find'?'🎨 自由探索':'🔍 找形状'
  modeBtn.classList.toggle('active',mode==='find')
  initGame()
})

shuffleBtn.addEventListener('click',()=>{pickShapes();render();clearHint();if(mode==='find')setTimeout(speakFind,300);else setTimeout(()=>scheduleNextHint(),500)})

initGame()
</script>
</body></html>
