<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🐾 认识事物</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#1a1a2e;color:#fff;font-family:sans-serif;overflow:hidden;height:100dvh;display:flex;flex-direction:column;align-items:center;touch-action:manipulation;-webkit-user-select:none;user-select:none}
.back{position:absolute;top:12px;left:12px;color:#888;text-decoration:none;font-size:14px;z-index:10;background:#16213e88;padding:4px 10px;border-radius:8px}
.back:hover{color:#e94560}
#header{padding:8px 0 2px;text-align:center;position:relative;width:100%}
#header h1{font-size:clamp(1em,4vw,1.4em);color:#e94560;margin-bottom:2px}
#catBar{display:flex;gap:6px;justify-content:center;align-items:center;margin:4px 0;flex-wrap:wrap}
.cat-btn{padding:5px 14px;font-size:clamp(.7em,2.8vw,.9em);border:none;border-radius:20px;cursor:pointer;background:#0f3460;color:#7ec8e3;font-weight:bold;transition:.3s}
.cat-btn.active{background:#e94560;color:#fff}
#modeBar{display:flex;gap:8px;justify-content:center;align-items:center;margin:3px 0}
#modeBtn{padding:5px 16px;font-size:clamp(.75em,2.8vw,.95em);border:none;border-radius:20px;cursor:pointer;background:#16213e;color:#aaa;font-weight:bold;transition:.3s}
#modeBtn.active{background:#e94560;color:#fff}
#shuffleBtn{padding:5px 12px;font-size:clamp(.75em,2.8vw,.95em);border:none;border-radius:20px;cursor:pointer;background:#16213e;color:#aaa;font-weight:bold;transition:.3s}
#shuffleBtn:active{transform:scale(.9)}
#countWrap{font-size:clamp(1em,4vw,1.5em);min-height:1.5em;text-align:center;padding:0 8px}
#countWrap .emoji{font-size:clamp(1.5em,6vw,2.5em)}
#grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:clamp(8px,2vw,14px);padding:clamp(6px,1.5vw,12px);max-width:520px;width:100%;flex:1;align-content:center}
.item-btn{border-radius:16px;aspect-ratio:1;cursor:pointer;border:4px solid rgba(255,255,255,.12);transition:transform .2s,box-shadow .2s,border-color .2s;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.item-btn:active{transform:scale(.92)}
.item-btn .item-emoji{font-size:clamp(2em,8vw,4em);line-height:1}
.item-btn .item-name{font-size:clamp(.55em,2.2vw,.8em);color:rgba(255,255,255,.9);font-weight:bold;text-shadow:0 1px 3px rgba(0,0,0,.5);line-height:1}
.item-btn.pop{animation:pop .35s ease}
@keyframes pop{0%{transform:scale(1)}30%{transform:scale(1.2)}60%{transform:scale(.95)}100%{transform:scale(1)}}
.item-btn.hint{border-color:#fff;box-shadow:0 0 25px rgba(255,255,255,.6);animation:pulse .6s ease infinite alternate}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.08)}}
.item-btn.correct{animation:correctPop .5s ease}
@keyframes correctPop{0%{transform:scale(1)}20%{transform:scale(1.3)}100%{transform:scale(1)}}
.item-btn.wrong{animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
#celebrate{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5}
#scoreBadge{position:absolute;top:12px;right:12px;font-size:clamp(1.2em,4vw,1.6em);z-index:3;color:#f1c40f;background:#16213e88;padding:2px 10px;border-radius:12px}
</style></head><body>
<a href="index.html" class="back">← 返回</a>
<div id="scoreBadge" style="display:none">⭐ 0</div>
<div id="header">
  <h1>🐾 认识事物</h1>
  <div id="catBar">
    <button class="cat-btn active" data-cat="all">全部</button>
    <button class="cat-btn" data-cat="animal">🐱 动物</button>
    <button class="cat-btn" data-cat="veggie">🥦 蔬菜</button>
    <button class="cat-btn" data-cat="home">🏠 用品</button>
    <button class="cat-btn" data-cat="fruit">🍎 水果</button>
    <button class="cat-btn" data-cat="vehicle">🚗 车车</button>
    <button class="cat-btn" data-cat="job">👨‍⚕️ 职业</button>
  </div>
  <div id="modeBar">
    <button id="modeBtn">🔍 找一找</button>
    <button id="shuffleBtn">🔄 换一批</button>
  </div>
  <div id="countWrap"></div>
</div>
<div id="grid"></div>
<canvas id="celebrate"></canvas>
<script>
const ALL_ITEMS = [
  // --- 动物 ---
  {name:'猫咪', emoji:'🐱', cat:'animal'},
  {name:'小狗', emoji:'🐶', cat:'animal'},
  {name:'兔子', emoji:'🐰', cat:'animal'},
  {name:'小鸡', emoji:'🐔', cat:'animal'},
  {name:'小鱼', emoji:'🐟', cat:'animal'},
  {name:'青蛙', emoji:'🐸', cat:'animal'},
  {name:'小鸟', emoji:'🐦', cat:'animal'},
  {name:'小鸭', emoji:'🦆', cat:'animal'},
  {name:'小猪', emoji:'🐷', cat:'animal'},
  {name:'小牛', emoji:'🐮', cat:'animal'},
  {name:'小羊', emoji:'🐑', cat:'animal'},
  {name:'熊猫', emoji:'🐼', cat:'animal'},
  {name:'狐狸', emoji:'🦊', cat:'animal'},
  {name:'小马', emoji:'🐴', cat:'animal'},
  // --- 蔬菜 ---
  {name:'胡萝卜', emoji:'🥕', cat:'veggie'},
  {name:'西兰花', emoji:'🥦', cat:'veggie'},
  {name:'白菜', emoji:'🥬', cat:'veggie'},
  {name:'西红柿', emoji:'🍅', cat:'veggie'},
  {name:'玉米', emoji:'🌽', cat:'veggie'},
  {name:'土豆', emoji:'🥔', cat:'veggie'},
  {name:'黄瓜', emoji:'🥒', cat:'veggie'},
  {name:'洋葱', emoji:'🧅', cat:'veggie'},
  {name:'大蒜', emoji:'🧄', cat:'veggie'},
  {name:'辣椒', emoji:'🌶️', cat:'veggie'},
  {name:'茄子', emoji:'🍆', cat:'veggie'},
  {name:'蘑菇', emoji:'🍄', cat:'veggie'},
  // --- 家庭用品 ---
  {name:'椅子', emoji:'🪑', cat:'home'},
  {name:'床', emoji:'🛏️', cat:'home'},
  {name:'台灯', emoji:'💡', cat:'home'},
  {name:'锅', emoji:'🍳', cat:'home'},
  {name:'杯子', emoji:'☕', cat:'home'},
  {name:'剪刀', emoji:'✂️', cat:'home'},
  {name:'扫帚', emoji:'🧹', cat:'home'},
  {name:'雨伞', emoji:'☂️', cat:'home'},
  {name:'钥匙', emoji:'🔑', cat:'home'},
  {name:'铃铛', emoji:'🔔', cat:'home'},
  {name:'闹钟', emoji:'⏰', cat:'home'},
  {name:'书本', emoji:'📖', cat:'home'},
  {name:'铅笔', emoji:'✏️', cat:'home'},
  {name:'气球', emoji:'🎈', cat:'home'},
  // --- 水果 ---
  {name:'苹果', emoji:'🍎', cat:'fruit'},
  {name:'香蕉', emoji:'🍌', cat:'fruit'},
  {name:'西瓜', emoji:'🍉', cat:'fruit'},
  {name:'葡萄', emoji:'🍇', cat:'fruit'},
  {name:'橘子', emoji:'🍊', cat:'fruit'},
  {name:'桃子', emoji:'🍑', cat:'fruit'},
  {name:'草莓', emoji:'🍓', cat:'fruit'},
  {name:'芒果', emoji:'🥭', cat:'fruit'},
  {name:'樱桃', emoji:'🍒', cat:'fruit'},
  {name:'菠萝', emoji:'🍍', cat:'fruit'},
  {name:'蓝莓', emoji:'🫐', cat:'fruit'},
  {name:'梨', emoji:'🍐', cat:'fruit'},
  // --- 交通 ---
  {name:'小汽车', emoji:'🚗', cat:'vehicle'},
  {name:'公交车', emoji:'🚌', cat:'vehicle'},
  {name:'火车', emoji:'🚂', cat:'vehicle'},
  {name:'飞机', emoji:'✈️', cat:'vehicle'},
  {name:'轮船', emoji:'🚢', cat:'vehicle'},
  {name:'自行车', emoji:'🚲', cat:'vehicle'},
  {name:'消防车', emoji:'🚒', cat:'vehicle'},
  {name:'救护车', emoji:'🚑', cat:'vehicle'},
  {name:'出租车', emoji:'🚕', cat:'vehicle'},
  {name:'摩托车', emoji:'🏍️', cat:'vehicle'},
  {name:'火箭', emoji:'🚀', cat:'vehicle'},
  {name:'直升机', emoji:'🚁', cat:'vehicle'},
  // --- 职业 ---
  {name:'医生', emoji:'👨‍⚕️', cat:'job'},
  {name:'老师', emoji:'👩‍🏫', cat:'job'},
  {name:'警察', emoji:'👮', cat:'job'},
  {name:'消防员', emoji:'🧑‍🚒', cat:'job'},
  {name:'厨师', emoji:'👨‍🍳', cat:'job'},
  {name:'农民', emoji:'👨‍🌾', cat:'job'},
  {name:'护士', emoji:'👩‍⚕️', cat:'job'},
  {name:'工人', emoji:'👷', cat:'job'},
  {name:'画家', emoji:'🧑‍🎨', cat:'job'},
  {name:'科学家', emoji:'🧑‍🔬', cat:'job'},
  {name:'宇航员', emoji:'👨‍🚀', cat:'job'},
  {name:'飞行员', emoji:'🧑‍✈️', cat:'job'},
]
const CAT_COLORS = {animal:'#1E90FF22',veggie:'#00E67622',home:'#FF8C0022',fruit:'#FF2D2D22',vehicle:'#FFD70022',job:'#BB5EFF22'}
const PRAISE = ['太棒了！','真厉害！','好聪明！','非常好！','真棒！','做得好！']
const ENCOURAGE = ['再试试～','换一个看看～','加油喔～','差一点点～']

let currentCat = 'all'
let items = []
let mode = 'explore'
let quizIdx = 0
let quizScore = 0
let hintTimer = null

const gridEl = document.getElementById('grid')
const countWrap = document.getElementById('countWrap')
const modeBtn = document.getElementById('modeBtn')
const shuffleBtn = document.getElementById('shuffleBtn')
const catBar = document.getElementById('catBar')
const celebrateCanvas = document.getElementById('celebrate')
const scoreBadge = document.getElementById('scoreBadge')
const ctx = celebrateCanvas.getContext('2d')
let particles = []
let animFrame = null
let audioCtx = null

function resizeCanvas(){celebrateCanvas.width=window.innerWidth;celebrateCanvas.height=window.innerHeight}
window.addEventListener('resize',resizeCanvas);resizeCanvas()

// --- Audio: applause ---
function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)()
  return audioCtx
}
function playApplause(){
  try{
    const ac=getAudioCtx(), now=ac.currentTime
    for(let i=0;i<8;i++){
      const t=now+i*0.08+Math.random()*0.03
      const osc=ac.createOscillator(), gain=ac.createGain()
      osc.type='sawtooth'; osc.frequency.value=800+Math.random()*1200
      gain.gain.setValueAtTime(0.12,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.06)
      osc.connect(gain); gain.connect(ac.destination); osc.start(t); osc.stop(t+0.06)
    }
    const t2=now+0.7; const osc2=ac.createOscillator(), gain2=ac.createGain()
    osc2.type='sawtooth'; osc2.frequency.value=600
    gain2.gain.setValueAtTime(0.2,t2); gain2.gain.exponentialRampToValueAtTime(0.001,t2+0.1)
    osc2.connect(gain2); gain2.connect(ac.destination); osc2.start(t2); osc2.stop(t2+0.1)
  }catch(e){}
}

// --- Speech ---
function speak(text,cb){
  if(!window.speechSynthesis)return cb&&cb()
  window.speechSynthesis.cancel()
  const msg=new SpeechSynthesisUtterance(text)
  msg.lang='zh-CN'; msg.rate=0.5; msg.pitch=1.2
  msg.onend=()=>{cb&&cb()}; msg.onerror=()=>{cb&&cb()}
  speechSynthesis.speak(msg)
}
function speakItem(item){speak(item.name,()=>{if(mode==='explore')scheduleNextHint()})}
function speakFind(){speak('找'+items[quizIdx].name)}
function speakPraise(){speak(PRAISE[Math.floor(Math.random()*PRAISE.length)])}
function speakEncourage(){speak(ENCOURAGE[Math.floor(Math.random()*ENCOURAGE.length)])}

// --- Celebration ---
function spawnParticles(x,y){
  for(let i=0;i<60;i++){
    const angle=Math.random()*Math.PI*2, speed=2+Math.random()*6
    const pool=currentCat==='all'?ALL_ITEMS:ALL_ITEMS.filter(it=>it.cat===currentCat)
    particles.push({x,y,
      vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed-2,
      size:4+Math.random()*10,
      color:CAT_COLORS[pool[Math.floor(Math.random()*pool.length)].cat]==='all'?'#e94560':'#e94560',
      life:1, decay:0.01+Math.random()*0.015, wobble:Math.random()*4
    })
  }
  if(!animFrame) animFrame=requestAnimationFrame(drawParticles)
}
function drawParticles(){
  ctx.clearRect(0,0,celebrateCanvas.width,celebrateCanvas.height)
  let alive=false
  for(const p of particles){
    p.x+=p.vx;p.vy+=0.08;p.y+=p.vy
    p.x+=Math.sin(p.y*0.05)*p.wobble; p.life-=p.decay
    if(p.life<=0)continue
    alive=true; ctx.globalAlpha=p.life
    ctx.fillStyle=['#FF2D2D','#FFD700','#1E90FF','#00E676','#FF8C00','#BB5EFF','#FF69B4'][Math.floor(Math.random()*7)]
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size)
  }
  ctx.globalAlpha=1; particles=particles.filter(p=>p.life>0)
  if(alive)animFrame=requestAnimationFrame(drawParticles);else animFrame=null
}
function celebrate(el){
  const r=el.getBoundingClientRect()
  spawnParticles(r.left+r.width/2,r.top+r.height/2)
  countWrap.innerHTML='<div class="emoji">🎉✨🌟</div>'
  setTimeout(()=>countWrap.innerHTML='',1500)
}

// --- Logic ---
function shuffleArray(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function getPool(){
  return currentCat==='all'?ALL_ITEMS:ALL_ITEMS.filter(it=>it.cat===currentCat)
}

function pickItems(){
  const pool=getPool()
  const n=Math.min(6,pool.length)
  items=shuffleArray([...pool]).slice(0,n)
  quizIdx=Math.floor(Math.random()*items.length)
}

function initGame(){
  clearHint()
  if(mode==='explore') countWrap.innerHTML='👆 点一点听听看'
  else countWrap.innerHTML=''
  quizScore=0
  scoreBadge.style.display=mode==='find'?'block':'none'
  scoreBadge.textContent='⭐ 0'
  pickItems()
  render()
  if(mode==='find') setTimeout(speakFind,500)
  else setTimeout(()=>{if(mode==='explore')scheduleNextHint()},1000)
}

function render(){
  gridEl.innerHTML=''
  for(let i=0;i<items.length;i++){
    const it=items[i]
    const btn=document.createElement('div')
    btn.className='item-btn'
    btn.style.background=CAT_COLORS[it.cat]||'#1a1a2e'
    btn.dataset.i=i
    btn.innerHTML='<span class="item-emoji">'+it.emoji+'</span><span class="item-name">'+it.name+'</span>'
    btn.addEventListener('click',()=>handleTap(i))
    btn.addEventListener('touchstart',(e)=>{e.preventDefault();handleTap(i)},{passive:false})
    gridEl.appendChild(btn)
  }
  if(mode==='find') highlightQuiz()
}

function highlightQuiz(){
  document.querySelectorAll('.item-btn').forEach((el,i)=>el.classList.toggle('hint',i===quizIdx))
}

function handleTap(i){
  clearHint()
  const btn=document.querySelectorAll('.item-btn')[i]
  if(!btn) return
  if(mode==='explore'){
    btn.classList.remove('pop');void btn.offsetWidth;btn.classList.add('pop')
    celebrate(btn); speakItem(items[i])
  }else{
    if(i===quizIdx){
      btn.classList.remove('hint','wrong','correct');void btn.offsetWidth;btn.classList.add('correct')
      quizScore++; scoreBadge.textContent='⭐ '+quizScore
      celebrate(btn); playApplause(); speakPraise()
      pickItems(); render()
      setTimeout(speakFind,1200)
    }else{
      btn.classList.remove('wrong');void btn.offsetWidth;btn.classList.add('wrong')
      btn.classList.remove('hint'); speakEncourage()
      setTimeout(()=>{
        document.querySelectorAll('.item-btn').forEach((el,idx)=>{
          el.classList.remove('wrong')
          if(idx===quizIdx) el.classList.add('hint')
        })
      },600)
    }
  }
}

function scheduleNextHint(){
  clearHint(); if(mode!=='explore')return
  hintTimer=setTimeout(()=>{
    if(mode!=='explore')return
    const btns=document.querySelectorAll('.item-btn')
    if(!btns.length)return
    const idx=Math.floor(Math.random()*btns.length)
    btns.forEach(b=>b.classList.remove('hint'))
    btns[idx].classList.add('hint')
    speakItem(items[parseInt(btns[idx].dataset.i)])
  },5000)
}

function clearHint(){if(hintTimer){clearTimeout(hintTimer);hintTimer=null}}

// --- Category switching ---
catBar.addEventListener('click',e=>{
  const btn=e.target.closest('.cat-btn')
  if(!btn) return
  catBar.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'))
  btn.classList.add('active')
  currentCat=btn.dataset.cat
  clearHint(); initGame()
})

// --- Mode toggle ---
modeBtn.addEventListener('click',()=>{
  clearHint(); particles=[]
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null}
  ctx.clearRect(0,0,celebrateCanvas.width,celebrateCanvas.height)
  mode=mode==='explore'?'find':'explore'
  modeBtn.textContent=mode==='find'?'🎨 自由探索':'🔍 找一找'
  modeBtn.classList.toggle('active',mode==='find')
  initGame()
})

// --- Shuffle ---
shuffleBtn.addEventListener('click',()=>{
  pickItems(); render(); clearHint()
  if(mode==='explore') setTimeout(()=>scheduleNextHint(),500)
})

// --- Init ---
initGame()
</script>
</body></html>
