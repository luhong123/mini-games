<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🌈 认识颜色</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#1e1e2a;color:#fff;font-family:sans-serif;overflow:hidden;height:100dvh;display:flex;flex-direction:column;align-items:center;touch-action:manipulation;-webkit-user-select:none;user-select:none}
.back{position:absolute;top:12px;left:12px;color:#888;text-decoration:none;font-size:14px;z-index:10;background:#16213e88;padding:4px 10px;border-radius:8px}
.back:hover{color:#e94560}
#header{padding:8px 0 2px;text-align:center;position:relative;width:100%}
#header h1{font-size:clamp(1em,4vw,1.4em);color:#e94560;margin-bottom:2px}
#modeBar{display:flex;gap:8px;justify-content:center;align-items:center;margin:4px 0;flex-wrap:wrap}
#modeBtn{padding:6px 18px;font-size:clamp(.8em,3vw,1em);border:none;border-radius:20px;cursor:pointer;background:#0f3460;color:#7ec8e3;font-weight:bold;transition:.3s}
#modeBtn.active{background:#e94560;color:#fff}
#shuffleBtn{padding:6px 14px;font-size:clamp(.8em,3vw,1em);border:none;border-radius:20px;cursor:pointer;background:#16213e;color:#aaa;font-weight:bold;transition:.3s}
#shuffleBtn:active{transform:scale(.9)}
#countWrap{font-size:clamp(1em,4vw,1.5em);min-height:1.5em;padding:0 8px}
#countWrap .emoji{font-size:clamp(1.5em,6vw,2.5em)}
#grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:clamp(8px,2vw,14px);padding:clamp(6px,1.5vw,12px);max-width:520px;width:100%;flex:1;align-content:center}
.color-btn{border-radius:50%;aspect-ratio:1;cursor:pointer;border:4px solid rgba(255,255,255,.18);transition:transform .2s,box-shadow .2s,border-color .2s;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.color-btn:active{transform:scale(.92)}
.color-btn .obj-emoji{font-size:clamp(1.8em,7vw,3.5em);line-height:1}
.color-btn .item-img{width:clamp(35px,13vw,65px);height:clamp(35px,13vw,65px);object-fit:contain;pointer-events:none}
.color-btn .obj-name{font-size:clamp(.55em,2.2vw,.75em);color:rgba(255,255,255,.9);font-weight:bold;text-shadow:0 1px 3px rgba(0,0,0,.5);line-height:1}
.color-btn.pop{animation:pop .35s ease}
@keyframes pop{0%{transform:scale(1)}30%{transform:scale(1.2)}60%{transform:scale(.95)}100%{transform:scale(1)}}
.color-btn.hint{border-color:#fff;box-shadow:0 0 25px rgba(255,255,255,.6);animation:pulse .6s ease infinite alternate}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.08)}}
.color-btn.correct{animation:correctPop .5s ease}
@keyframes correctPop{0%{transform:scale(1)}20%{transform:scale(1.3)}100%{transform:scale(1)}}
.color-btn.wrong{animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
#celebrate{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5}
#scoreBadge{position:absolute;top:12px;right:12px;font-size:clamp(1.2em,4vw,1.6em);z-index:3;color:#f1c40f;background:#16213e88;padding:2px 10px;border-radius:12px}
</style></head><body>
<a href="index.html" class="back">← 返回</a>
<div id="scoreBadge" style="display:none">⭐ 0</div>
<div id="header">
  <h1>🌈 认识颜色</h1>
  <div id="modeBar">
    <button id="modeBtn">🔍 找颜色</button>
    <button id="shuffleBtn">🔄 换一批</button>
  </div>
  <div id="countWrap"></div>
</div>
<div id="grid"></div>
<canvas id="celebrate"></canvas>
<script>
const IMG_MAP = {
  '🍎':'img/fruit/apple.svg','🍌':'img/fruit/banana.svg','🐬':'img/animal/frog.svg',
  '🐸':'img/animal/frog.svg','🍊':'img/fruit/orange.svg','🍇':'img/fruit/grapes.svg',
  '🌸':'img/emotion/happy.svg',
}
const ALL_COLORS = [
  {name:'红色',hex:'#FF2D2D',emoji:'🍎',obj:'苹果'},
  {name:'黄色',hex:'#FFD700',emoji:'🍌',obj:'香蕉'},
  {name:'蓝色',hex:'#1E90FF',emoji:'🐬',obj:'海豚'},
  {name:'绿色',hex:'#00E676',emoji:'🐸',obj:'青蛙'},
  {name:'橙色',hex:'#FF8C00',emoji:'🍊',obj:'橘子'},
  {name:'紫色',hex:'#BB5EFF',emoji:'🍇',obj:'葡萄'},
  {name:'粉色',hex:'#FF69B4',emoji:'🌸',obj:'花朵'},
]
const PRAISE = ['太棒了！','真厉害！','好聪明！','非常好！','真棒！','做得好！']
const ENCOURAGE = ['再试试～','换一个看看～','加油喔～','差一点点～']

let colors = []
let mode = 'explore' // explore | find
let quizIdx = 0
let quizScore = 0
let hintTimer = null

const gridEl = document.getElementById('grid')
const countWrap = document.getElementById('countWrap')
const modeBtn = document.getElementById('modeBtn')
const shuffleBtn = document.getElementById('shuffleBtn')
const celebrateCanvas = document.getElementById('celebrate')
const scoreBadge = document.getElementById('scoreBadge')
const ctx = celebrateCanvas.getContext('2d')
let particles = []
let animFrame = null
let audioCtx = null

function resizeCanvas(){celebrateCanvas.width=window.innerWidth;celebrateCanvas.height=window.innerHeight}
window.addEventListener('resize',resizeCanvas);resizeCanvas()

// --- Audio: applause claps using Web Audio API ---
function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)()
  return audioCtx
}

function playApplause(){
  try {
    const ac = getAudioCtx()
    const now = ac.currentTime
    for(let i=0;i<8;i++){
      const t = now + i*0.08 + Math.random()*0.03
      const osc = ac.createOscillator()
      const gain = ac.createGain()
      osc.type = 'sawtooth'
      osc.frequency.value = 800 + Math.random()*1200
      gain.gain.setValueAtTime(0.12, t)
      gain.gain.exponentialRampToValueAtTime(0.001, t+0.06)
      osc.connect(gain)
      gain.connect(ac.destination)
      osc.start(t)
      osc.stop(t+0.06)
    }
    // one louder clap at end
    const t2 = now + 0.7
    const osc2 = ac.createOscillator()
    const gain2 = ac.createGain()
    osc2.type = 'sawtooth'
    osc2.frequency.value = 600
    gain2.gain.setValueAtTime(0.2, t2)
    gain2.gain.exponentialRampToValueAtTime(0.001, t2+0.1)
    osc2.connect(gain2)
    gain2.connect(ac.destination)
    osc2.start(t2)
    osc2.stop(t2+0.1)
  } catch(e) {/* audio not supported */}
}

// --- Speech ---
function speak(text, cb){
  if(!window.speechSynthesis)return cb&&cb()
  window.speechSynthesis.cancel()
  const msg = new SpeechSynthesisUtterance(text)
  msg.lang = 'zh-CN'; msg.rate = 0.5; msg.pitch = 1.6
  msg.onend = ()=>{cb&&cb()}
  msg.onerror = ()=>{cb&&cb()}
  const cv=getChildVoice();if(cv)msg.voice=cv;speechSynthesis.speak(msg)
}

function speakColor(color){
  speak(color.name + ' ' + color.obj, ()=>{
    if(mode==='explore') scheduleNextHint()
  })
}

function speakFind(){
  speak('找' + colors[quizIdx].name)
}


let progress=JSON.parse(localStorage.getItem('prog_'+location.pathname)||'{}')
function saveProgress(correct,total){const k=items?items.map(i=>i.name).sort().join(','):'default';if(!progress[k])progress[k]={c:0,t:0};progress[k].c+=correct;progress[k].t+=total;localStorage.setItem('prog_'+location.pathname,JSON.stringify(progress))}
function getProgress(){const k=items?items.map(i=>i.name).sort().join(','):'default';return progress[k]||{c:0,t:0}}
function speakPraise(){
  speak(PRAISE[Math.floor(Math.random()*PRAISE.length)])
}

function speakEncourage(){
  speak(ENCOURAGE[Math.floor(Math.random()*ENCOURAGE.length)])
}

// --- Celebration Particles ---
function spawnParticles(x,y){
  for(let i=0;i<60;i++){
    const angle = Math.random()*Math.PI*2
    const speed = 2+Math.random()*6
    particles.push({
      x, y,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed-2,
      size:4+Math.random()*10,
      color:ALL_COLORS[Math.floor(Math.random()*ALL_COLORS.length)].hex,
      life:1,
      decay:0.01+Math.random()*0.015,
      wobble:Math.random()*4
    })
  }
  if(!animFrame){animFrame=requestAnimationFrame(drawParticles)}
}

function drawParticles(){
  ctx.clearRect(0,0,celebrateCanvas.width,celebrateCanvas.height)
  let alive = false
  for(const p of particles){
    p.x += p.vx; p.vy += 0.08; p.y += p.vy
    p.x += Math.sin(p.y*0.05)*p.wobble
    p.life -= p.decay
    if(p.life<=0) continue
    alive = true
    ctx.globalAlpha = p.life
    ctx.fillStyle = p.color
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size)
  }
  ctx.globalAlpha = 1
  particles = particles.filter(p=>p.life>0)
  if(alive) animFrame = requestAnimationFrame(drawParticles)
  else animFrame = null
}

function celebrate(el){
  const r = el.getBoundingClientRect()
  spawnParticles(r.left+r.width/2, r.top+r.height/2)
  countWrap.innerHTML = '<div class="emoji">🎉✨🌟</div>'
  setTimeout(()=>countWrap.innerHTML='',1500)
}

// --- Game Logic ---
function shuffleArray(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}


document.querySelector('h1').addEventListener('contextmenu',e=>{e.preventDefault();showSettings()})
function showSettings(){
  const old=document.getElementById('settingsPanel');if(old){old.remove();return}
  const panel=document.createElement('div')
  panel.id='settingsPanel'
  panel.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px'
  const title=document.createElement('div');title.textContent='⚙️ 家长设置';title.style.cssText='color:#e94560;font-size:1.5em;font-weight:bold'
  const speedLabel=document.createElement('div');speedLabel.textContent='语速: 0.5';speedLabel.style.cssText='color:#fff;font-size:1em'
  const speedSlider=document.createElement('input');speedSlider.type='range';speedSlider.min='0.3';speedSlider.max='0.9';speedSlider.step='0.1';speedSlider.value='0.5'
  speedSlider.style.cssText='width:200px'
  speedSlider.oninput=()=>{speedLabel.textContent='语速: '+speedSlider.value;document.querySelectorAll('meta[name=viewport]')}
  const countLabel=document.createElement('div');countLabel.textContent='每次显示: 6个';countLabel.style.cssText='color:#fff;font-size:1em'
  const countSlider=document.createElement('input');countSlider.type='range';countSlider.min='3';countSlider.max='9';countSlider.step='1';countSlider.value='6'
  countSlider.style.cssText='width:200px'
  countSlider.oninput=()=>{countLabel.textContent='每次显示: '+countSlider.value+'个'}
  const closeBtn=document.createElement('button');closeBtn.textContent='完成';closeBtn.style.cssText='padding:10px 30px;font-size:1em;border:none;border-radius:8px;background:#e94560;color:#fff;font-weight:bold;margin-top:10px'
  closeBtn.onclick=()=>{panel.remove();window._parentSpeed=parseFloat(speedSlider.value);window._parentCount=parseInt(countSlider.value)}
  panel.appendChild(title);panel.appendChild(speedLabel);panel.appendChild(speedSlider)
  panel.appendChild(countLabel);panel.appendChild(countSlider);panel.appendChild(closeBtn)
  document.body.appendChild(panel)
}

function initGame(){
  clearHint()
  if(mode==='explore') countWrap.innerHTML = '👆 点一点颜色听听看'
  else countWrap.innerHTML = ''
  quizScore = 0
  scoreBadge.style.display = mode==='find'?'block':'none'
  scoreBadge.textContent = '⭐ 0'
  pickColors()
  render()
  if(mode==='find') setTimeout(speakFind, 500)
  else setTimeout(()=>{if(mode==='explore')scheduleNextHint()}, 1000)
}

function pickColors(){
  colors = shuffleArray([...ALL_COLORS]).slice(0, 7)
  quizIdx = Math.floor(Math.random()*colors.length)
}

function render(){
  gridEl.innerHTML = ''
  for(let i=0;i<colors.length;i++){
    const c = colors[i]
    const btn = document.createElement('div')
    btn.className = 'color-btn'
    btn.style.background = c.hex
    const imgSrc=IMG_MAP[c.emoji];btn.innerHTML=imgSrc?'<img class="item-img" src="'+imgSrc+'"><span class="obj-name">'+c.name+'</span>':'<span class="obj-emoji">'+c.emoji+'</span><span class="obj-name">'+c.name+'</span>'
    btn.dataset.i = i
    btn.addEventListener('click', ()=>handleTap(i))
    btn.addEventListener('touchstart', (e)=>{e.preventDefault();handleTap(i)},{passive:false})
    gridEl.appendChild(btn)
  }
  if(mode==='find') highlightQuiz()
}

function highlightQuiz(){
  document.querySelectorAll('.color-btn').forEach((el,i)=>{
    el.classList.toggle('hint', i===quizIdx)
  })
}

function handleTap(i){
  clearHint()
  const btn = document.querySelectorAll('.color-btn')[i]
  if(!btn) return

  if(mode==='explore'){
    btn.classList.remove('pop'); void btn.offsetWidth; btn.classList.add('pop')
    celebrate(btn)
    speakColor(colors[i])
  } else {
    if(i===quizIdx){
      btn.classList.remove('hint','wrong','correct'); void btn.offsetWidth; btn.classList.add('correct')
      quizScore++
      scoreBadge.textContent = '⭐ '+quizScore
      celebrate(btn)
      playApplause();vibrate(50)
      speakPraise()
      // next round
      pickColors()
      render()
      setTimeout(speakFind, 1200)
    } else {
      btn.classList.remove('wrong'); void btn.offsetWidth; btn.classList.add('wrong')
      btn.classList.remove('hint')
      speakEncourage();vibrate(100);playWrongSound()
      setTimeout(()=>{
        document.querySelectorAll('.color-btn').forEach((el,idx)=>{
          el.classList.remove('wrong')
          if(idx===quizIdx) el.classList.add('hint')
        })
      }, 600)
    }
  }
}

function scheduleNextHint(){
  clearHint()
  if(mode!=='explore') return
  hintTimer = setTimeout(()=>{
    if(mode!=='explore') return
    const btns = document.querySelectorAll('.color-btn')
    if(!btns.length) return
    const idx = Math.floor(Math.random()*btns.length)
    btns.forEach(b=>b.classList.remove('hint'))
    btns[idx].classList.add('hint')
    const ci = parseInt(btns[idx].dataset.i)
    speakColor(colors[ci])
  }, 5000)
}

function clearHint(){
  if(hintTimer){clearTimeout(hintTimer);hintTimer=null}
}

// --- Mode Toggle ---
function toggleMode(){
  clearHint()
  particles=[]
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null}
  ctx.clearRect(0,0,celebrateCanvas.width,celebrateCanvas.height)

  if(mode==='explore'){
    mode='find'
    modeBtn.textContent='🎨 自由探索'
    modeBtn.classList.add('active')
  } else {
    mode='explore'
    modeBtn.textContent='🔍 找颜色'
    modeBtn.classList.remove('active')
  }
  initGame()
}

modeBtn.addEventListener('click', toggleMode)

// --- Shuffle / Refresh ---
shuffleBtn.addEventListener('click', ()=>{
  if(mode==='explore'){
    pickColors()
    render()
    clearHint()
    setTimeout(()=>{if(mode==='explore')scheduleNextHint()}, 500)
  } else {
    initGame()
  }
})

// --- Init ---
initGame()
</script>
</body></html>
