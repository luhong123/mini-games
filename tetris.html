<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8">
<meta name="description" content="小游戏合集 · 🧱 俄罗斯方块">
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%2016%2016%27%3E%3Ctext%20y%3D%2714%27%20font-size%3D%2714%27%3E%F0%9F%8E%AE%3C%2Ftext%3E%3C%2Fsvg%3E">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🧱 俄罗斯方块</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#fff;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100dvh}
h1{margin:15px 0;font-size:1.8em;color:#e94560}
#gameArea{display:flex;gap:25px;align-items:flex-start}
#boardWrap{background:#0f3460;border:3px solid #16213e;border-radius:8px;padding:5px}
canvas{display:block;background:#0a0a1a}
#side{display:flex;flex-direction:column;gap:15px;min-width:130px}
#info p{font-size:1.1em;margin:5px 0;color:#aaa}
#info span{color:#fff;font-weight:bold}
#nextCanvas{background:#0a0a1a;border:2px solid #16213e;border-radius:6px}
button{padding:8px 20px;font-size:1em;border:none;border-radius:6px;cursor:pointer;background:#e94560;color:#fff;font-weight:bold;transition:.2s}
button:hover{background:#c7364f}
#controls{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;max-width:200px}
#controls button{flex:1;min-width:40px;padding:8px 6px;font-size:.85em;background:#0f3460}
#controls button:hover{background:#1a4a7a}
.key-hint{font-size:.75em;color:#666;margin-top:5px;text-align:center}
.back{position:absolute;top:15px;left:15px;color:#888;text-decoration:none}
.back:hover{color:#e94560}

body{padding-bottom:env(safe-area-inset-bottom,0px)}
@media(orientation:landscape){body{padding-left:env(safe-area-inset-left,0px);padding-right:env(safe-area-inset-right,0px)}}

</style></head><body>
<a href="index.html" class="back">← 返回</a>
<h1>🧱 俄罗斯方块</h1>
<div id="gameArea">
  <div id="boardWrap"><canvas id="board" width="300" height="600"></canvas></div>
  <div id="side">
    <div id="info">
      <p>得分: <span id="score">0</span></p>
      <p>行数: <span id="lines">0</span></p>
      <p>等级: <span id="level">1</span></p>
      <p>最高分: <span id="best">0</span></p>
    </div>
    <p style="color:#aaa;font-size:.85em">下一个</p>
    <canvas id="nextCanvas" width="120" height="120"></canvas>
    <button id="startBtn">开始游戏</button>
    <div id="controls">
      <button id="leftBtn">←</button><button id="rightBtn">→</button>
      <button id="rotateBtn">↻</button><button id="dropBtn">↓</button>
    </div>
    <div class="key-hint">方向键移动 ↑旋转 空格落底</div>
  </div>
</div>
<script>
const CV=document.getElementById('board'),CTX=CV.getContext('2d')
const NCV=document.getElementById('nextCanvas'),NCTX=NCV.getContext('2d')
const R=20,COLS=15,ROWS=30
CV.width=COLS*R;CV.height=ROWS*R
NCV.width=120;NCV.height=120

const SHAPES=[
  [[1,1,1,1]], // I
  [[1,1],[1,1]], // O
  [[1,1,1],[0,1,0]], // T
  [[1,1,1],[1,0,0]], // L
  [[1,1,1],[0,0,1]], // J
  [[1,1,0],[0,1,1]], // S
  [[0,1,1],[1,1,0]]  // Z
]
const COLORS=['#00f0f0','#f0f000','#a000f0','#f0a000','#0000f0','#00f000','#f00000']

let board=[],score=0,lines=0,level=1,gameOver=false,paused=false,best=parseInt(localStorage.getItem('bestTetris')||'0')
let piece={x:0,y:0,shape:null,color:''}
let nextPiece=null,nextColor='',nextShape=null
let dropTimer=null,started=false
const startBtn=document.getElementById('startBtn'),bestEl=document.getElementById('best')

function initBoard(){board=Array.from({length:ROWS},()=>Array(COLS).fill(0))}
function randomPiece(){const i=Math.floor(Math.random()*SHAPES.length);return{shape:SHAPES[i].map(r=>[...r]),color:COLORS[i],index:i}}
function spawnPiece(){
  if(nextPiece){piece.shape=nextPiece.shape;piece.color=nextColor;piece.x=Math.floor((COLS-nextPiece.shape[0].length)/2);piece.y=0;generateNext()}
  else{const p=randomPiece();piece.shape=p.shape;piece.color=p.color;piece.x=Math.floor((COLS-p.shape[0].length)/2);piece.y=0;generateNext()}
  if(collides(piece.shape,piece.x,piece.y)){gameOver=true;clearInterval(dropTimer);render()}
}
function generateNext(){const p=randomPiece();nextPiece=p;nextColor=p.color;nextShape=p.shape}
function collides(shape,px,py){for(let r=0;r<shape.length;r++)for(let c=0;c<shape[r].length;c++){if(shape[r][c]){const x=px+c,y=py+r;if(x<0||x>=COLS||y>=ROWS||(y>=0&&board[y][x]))return true}}return false}
function lockPiece(){
  for(let r=0;r<piece.shape.length;r++)for(let c=0;c<piece.shape[r].length;c++)if(piece.shape[r][c]){const x=piece.x+c,y=piece.y+r;if(y>=0)board[y][x]=piece.color}
  clearLines();spawnPiece()
}
function clearLines(){
  let cleared=0
  for(let r=ROWS-1;r>=0;r--){if(board[r].every(c=>c!==0)){board.splice(r,1);board.unshift(Array(COLS).fill(0));cleared++;r++}}
  if(cleared>0){lines+=cleared;score+=cleared*100*level;level=Math.floor(lines/10)+1;document.getElementById('score').textContent=score;document.getElementById('lines').textContent=lines;document.getElementById('level').textContent=level;clearInterval(dropTimer);dropTimer=setInterval(drop,Math.max(100,1000-level*80));if(score>best){best=score;localStorage.setItem('bestTetris',best);bestEl.textContent=best}}
}
function drop(){if(gameOver||paused)return;if(!collides(piece.shape,piece.x,piece.y+1)){piece.y++;render()}else lockPiece()}
function move(dx){if(gameOver||paused)return;if(!collides(piece.shape,piece.x+dx,piece.y)){piece.x+=dx;render()}}
function rotate(){if(gameOver||paused)return;const shape=piece.shape[0].map((_,i)=>piece.shape.map(r=>r[i]).reverse());if(!collides(shape,piece.x,piece.y))piece.shape=shape;render()}
function hardDrop(){if(gameOver||paused)return;while(!collides(piece.shape,piece.x,piece.y+1))piece.y++;lockPiece();render()}
function render(){
  CTX.fillStyle='#0a0a1a';CTX.fillRect(0,0,CV.width,CV.height)
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){if(board[r][c]){CTX.fillStyle=board[r][c];CTX.fillRect(c*R+1,r*R+1,R-2,R-2)}}
  if(!gameOver&&piece.shape)for(let r=0;r<piece.shape.length;r++)for(let c=0;c<piece.shape[r].length;c++){if(piece.shape[r][c]){CTX.fillStyle=piece.color;CTX.fillRect((piece.x+c)*R+1,(piece.y+r)*R+1,R-2,R-2)}}
  if(gameOver){CTX.fillStyle='rgba(0,0,0,.7)';CTX.fillRect(0,0,CV.width,CV.height);CTX.fillStyle='#e94560';CTX.font='bold 40px sans-serif';CTX.textAlign='center';CTX.fillText('GAME OVER',CV.width/2,CV.height/2)}
  NCTX.fillStyle='#0a0a1a';NCTX.fillRect(0,0,120,120)
  if(nextShape)for(let r=0;r<nextShape.length;r++)for(let c=0;c<nextShape[r].length;c++){if(nextShape[r][c]){NCTX.fillStyle=nextColor;NCTX.fillRect(c*30+4,r*30+4,28,28)}}
}
function startGame(){
  initBoard();score=0;lines=0;level=1;gameOver=false;started=true
  document.getElementById('score').textContent='0';document.getElementById('lines').textContent='0';document.getElementById('level').textContent='1';bestEl.textContent=best
  generateNext();spawnPiece()
  clearInterval(dropTimer);dropTimer=setInterval(drop,1000)
  startBtn.textContent='重新开始';render()
}
startBtn.addEventListener('click',startGame)
document.addEventListener('keydown',e=>{if(!started)return;if(e.key==='ArrowLeft')move(-1);else if(e.key==='ArrowRight')move(1);else if(e.key==='ArrowUp')rotate();else if(e.key==='ArrowDown')drop();else if(e.key===' ')hardDrop()})
document.getElementById('leftBtn').onclick=_=>move(-1);document.getElementById('rightBtn').onclick=_=>move(1)
document.getElementById('rotateBtn').onclick=_=>rotate();document.getElementById('dropBtn').onclick=_=>hardDrop()
initBoard();render()
</script></body></html>
